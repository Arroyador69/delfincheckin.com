  var HTML_LANG = { es: 'es', en: 'en', it: 'it', pt: 'pt', fr: 'fr', fi: 'fi', sv: 'sv' };

  function adminOrigin() {
    var h = (location.hostname || '').toLowerCase();
    if (h === 'admin.delfincheckin.com' || h.endsWith('.vercel.app') || h === 'localhost' || h === '127.0.0.1')
      return '';
    return 'https://admin.delfincheckin.com';
  }

  function applyLinks() {
    var h = (location.hostname || '').toLowerCase();
    var base = adminOrigin();
    var login = document.getElementById('link-login');
    var form = document.getElementById('link-form');
    if (login) login.href = base + '/admin-login';
    if (form) {
      if (h === 'delfincheckin.com' || h === 'www.delfincheckin.com')
        form.href = 'https://form.delfincheckin.com/';
      else
        form.href = base + '/index.html';
    }
  }

  function setLang(lang) {
    if (!STR[lang]) lang = 'sv';
    var t = STR[lang];
    var m = META[lang] || META.sv;
    document.documentElement.lang = HTML_LANG[lang] || 'sv';
    var titleEl = document.querySelector('title');
    if (titleEl) titleEl.textContent = m.title;
    var metaD = document.querySelector('meta[name="description"]');
    if (metaD) metaD.setAttribute('content', m.description);

    document.querySelectorAll('[data-key]').forEach(function (el) {
      var k = el.getAttribute('data-key');
      if (k && t[k] != null) el.textContent = t[k];
    });
    var plansEl = document.getElementById('link-plans');
    if (plansEl) {
      plansEl.href = 'plans.html?lang=' + encodeURIComponent(lang) + '&source=landing';
    }
    var repProEl = document.getElementById('link-reputation-pro');
    if (repProEl) {
      repProEl.href = 'plans.html?lang=' + encodeURIComponent(lang) + '&source=landing-reputation#plan-pro';
    }
    syncLangSwitcher(lang);
    try {
      localStorage.setItem('landing_lang', lang);
      localStorage.setItem('preferred-locale', lang);
    } catch (e) {}
    try {
      var url = new URL(location.href);
      url.searchParams.set('lang', lang);
      if (history.replaceState) history.replaceState(null, '', url.toString());
    } catch (e2) {}
  }

  function langMeta(code) {
    for (var i = 0; i < LANGS.length; i++) {
      if (LANGS[i].code === code) return LANGS[i];
    }
    return LANGS[0];
  }

  function setDropdownOpen(open) {
    var dd = document.getElementById('lang-dropdown');
    var ch = document.getElementById('lang-chevron');
    var tr = document.getElementById('lang-trigger');
    if (!dd) return;
    if (open) {
      dd.classList.remove('hidden');
      if (ch) ch.classList.add('lang-dd-open');
      if (tr) tr.setAttribute('aria-expanded', 'true');
    } else {
      dd.classList.add('hidden');
      if (ch) ch.classList.remove('lang-dd-open');
      if (tr) tr.setAttribute('aria-expanded', 'false');
    }
  }

  function toggleLangDropdown() {
    var dd = document.getElementById('lang-dropdown');
    if (!dd) return;
    setDropdownOpen(dd.classList.contains('hidden'));
  }

  function syncLangSwitcher(lang) {
    var L = langMeta(lang);
    var tx = document.getElementById('lang-trigger-text');
    var fo = document.getElementById('lang-trigger-flag-only');
    if (tx) tx.textContent = (L.flag ? L.flag + ' ' : '') + L.name;
    if (fo) fo.textContent = L.flag || '';
    document.querySelectorAll('[data-lang-item]').forEach(function (btn) {
      var c = btn.getAttribute('data-lang-code');
      var active = c === lang;
      btn.setAttribute('aria-selected', active ? 'true' : 'false');
      btn.classList.toggle('bg-blue-50', active);
      btn.classList.toggle('text-blue-700', active);
      btn.classList.toggle('font-medium', active);
      btn.classList.toggle('text-gray-700', !active);
      var chk = btn.querySelector('[data-lang-check]');
      if (chk) chk.classList.toggle('hidden', !active);
    });
  }

  function initLangSwitcher() {
    var dd = document.getElementById('lang-dropdown');
    var tr = document.getElementById('lang-trigger');
    if (!dd || !tr) return;
    LANGS.forEach(function (L) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.setAttribute('role', 'option');
      btn.setAttribute('data-lang-item', '');
      btn.setAttribute('data-lang-code', L.code);
      btn.setAttribute('aria-selected', 'false');
      btn.className =
        'flex w-full items-center gap-3 px-4 py-2 text-left text-sm text-gray-700 transition-colors hover:bg-gray-100';
      var sf = document.createElement('span');
      sf.className = 'text-xl shrink-0';
      sf.textContent = L.flag;
      var sn = document.createElement('span');
      sn.className = 'flex-1';
      sn.textContent = L.name;
      var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('data-lang-check', '');
      svg.setAttribute('class', 'hidden h-4 w-4 shrink-0 text-blue-700');
      svg.setAttribute('fill', 'currentColor');
      svg.setAttribute('viewBox', '0 0 20 20');
      var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
      path.setAttribute(
        'fill-rule',
        'evenodd'
      );
      path.setAttribute(
        'd',
        'M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z'
      );
      path.setAttribute('clip-rule', 'evenodd');
      svg.appendChild(path);
      btn.appendChild(sf);
      btn.appendChild(sn);
      btn.appendChild(svg);
      btn.addEventListener('click', function () {
        setLang(L.code);
        setDropdownOpen(false);
      });
      dd.appendChild(btn);
    });
    tr.addEventListener('click', function (e) {
      e.stopPropagation();
      toggleLangDropdown();
    });
    document.addEventListener('mousedown', function (e) {
      var root = document.getElementById('lang-switcher-root');
      if (root && e.target && !root.contains(e.target)) setDropdownOpen(false);
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') setDropdownOpen(false);
    });
  }

  function pickInitialLang() {
    try {
      var u = new URL(location.href);
      var q = (u.searchParams.get('lang') || '').toLowerCase().trim().replace(/_/g, '-');
      if (q === 'pt-br' || q === 'pt-pt') q = 'pt';
      if (q === 'sv-se' || q === 'sv-fi') q = 'sv';
      if (q && STR[q]) return q;
    } catch (e0) {}
    var saved = null;
    var pref = null;
    try {
      saved = localStorage.getItem('landing_lang');
      pref = localStorage.getItem('preferred-locale');
    } catch (e) {}
    if (saved && STR[saved]) return saved;
    if (pref && STR[pref]) return pref;
    return 'sv';
  }

  function inferCountryCode() {
    try {
      var u = new URL(location.href);
      var qpCountry =
        (u.searchParams.get('country') || u.searchParams.get('geo') || '').trim().toUpperCase();
      if (qpCountry) return qpCountry;
    } catch (e0) {}

    try {
      var savedCountry = (localStorage.getItem('country_code') || '').trim().toUpperCase();
      if (savedCountry) return savedCountry;
    } catch (e1) {}

    try {
      var navLangs = navigator.languages && navigator.languages.length ? navigator.languages : [navigator.language];
      for (var i = 0; i < navLangs.length; i++) {
        var l = String(navLangs[i] || '').trim();
        if (!l) continue;
        var parts = l.split(/[-_]/);
        if (parts.length >= 2 && parts[1]) return parts[1].toUpperCase();
      }
    } catch (e2) {}

    return '';
  }

  function shouldShowMirComplianceSection() {
    try {
      var u = new URL(location.href);
      var force = (u.searchParams.get('show_mir') || '').trim();
      if (force === '1' || force === 'true') return true;
    } catch (e0) {}

    var cc = inferCountryCode();
    if (cc === 'ES') return true;

    try {
      var tz = Intl.DateTimeFormat().resolvedOptions().timeZone || '';
      if (
        tz === 'Europe/Madrid' ||
        tz === 'Atlantic/Canary' ||
        tz === 'Africa/Ceuta'
      ) {
        return true;
      }
    } catch (e1) {}

    return false;
  }

  function updateMirComplianceVisibility() {
    var section = document.getElementById('mir-compliance-section');
    if (!section) return;
    section.classList.toggle('hidden', !shouldShowMirComplianceSection());
  }

  initLangSwitcher();
  applyLinks();
  setLang(pickInitialLang());
  updateMirComplianceVisibility();
})();
