  function adminOrigin() {
    var h = (location.hostname || '').toLowerCase();
    if (h === 'admin.delfincheckin.com' || h.endsWith('.vercel.app') || h === 'localhost' || h === '127.0.0.1')
      return '';
    return 'https://admin.delfincheckin.com';
  }

  function apiBase() {
    return adminOrigin();

  /** Next solo sirve es|en|it|pt|fr|fi en /[locale]/subscribe; sueco → es para URLs Polar. */
  function polarLocaleParam() {
    return currentLang === 'sv' ? 'es' : currentLang;

  function polarHref(plan) {
    var q =
      'plan=' +
      encodeURIComponent(plan) +
      '&locale=' +
      encodeURIComponent(polarLocaleParam()) +
      '&seats=' +
      encodeURIComponent(String(seats)) +
      '&interval=' +
      encodeURIComponent(interval);
    return apiBase() + '/api/polar/subscribe-redirect?' + q;
  }

  function signupLocaleForApi() {
    if (currentLang === 'sv') return 'es';
    return currentLang;
  }

  function updatePaidLinks() {
    var a = document.getElementById('href-checkin');
    var b = document.getElementById('href-standard');
    var c = document.getElementById('href-pro');
    if (a) a.href = polarHref('checkin');
    if (b) b.href = polarHref('standard');
    if (c) c.href = polarHref('pro');
  }

  function setSeatsControls() {
    var v = document.getElementById('seats-val');
    if (v) v.textContent = String(seats);
    updatePaidLinks();
  }

  function setIntervalUi() {
    var m = document.getElementById('iv-month');
    var y = document.getElementById('iv-year');
    if (!m || !y) return;
    var onM = interval === 'month';
    m.className =
      'rounded-md px-3 py-1.5 text-sm font-medium ' +
      (onM ? 'bg-white text-teal-800 shadow-sm' : 'text-slate-600');
    y.className =
      'rounded-md px-3 py-1.5 text-sm font-medium ' +
      (!onM ? 'bg-white text-teal-800 shadow-sm' : 'text-slate-600');
    updatePaidLinks();
  }

  function setLang(lang) {
    if (!STR[lang]) lang = 'es';
    currentLang = lang;
    var t = STR[lang];
    var m = META[lang] || META.es;
    document.documentElement.lang = HTML_LANG[lang] || 'es';
    var titleEl = document.querySelector('title');
    if (titleEl) titleEl.textContent = m.title;
    var metaD = document.querySelector('meta[name="description"]');
    if (metaD) metaD.setAttribute('content', m.description);

    document.querySelectorAll('[data-key]').forEach(function (el) {
      var k = el.getAttribute('data-key');
      if (k && t[k] != null) {
        if (el.tagName === 'A' && (k === 'ctaPolar' || k === 'ctaFree')) {
          el.textContent = t[k];
        } else if (el.tagName === 'BUTTON' && k === 'ctaFree') {
          el.textContent = t.ctaFree;
        } else {
          el.textContent = t[k];
        }
      }
    });

    var login = document.getElementById('link-login');
    if (login) login.href = apiBase() + '/admin-login';

    updatePaidLinks();
    setIntervalUi();

    try {
      localStorage.setItem('landing_lang', lang);
      localStorage.setItem('preferred-locale', lang);
    } catch (e) {}
    try {
      var url = new URL(location.href);
      url.searchParams.set('lang', lang);
      if (history.replaceState) history.replaceState(null, '', url.toString());
    } catch (e2) {}

    syncLangSwitcher(lang);
  }

  function syncLangSwitcher(lang) {
    var L = LANGS.filter(function (x) { return x.code === lang; })[0] || LANGS[0];
    var tx = document.getElementById('lang-trigger-text');
    var fo = document.getElementById('lang-trigger-flag-only');
    if (tx) tx.textContent = (L.flag ? L.flag + ' ' : '') + L.name;
    if (fo) fo.textContent = L.flag || '';
    document.querySelectorAll('[data-lang-item]').forEach(function (btn) {
      var c = btn.getAttribute('data-lang-code');
      var active = c === lang;
      btn.setAttribute('aria-selected', active ? 'true' : 'false');
      btn.classList.toggle('bg-teal-50', active);
      btn.classList.toggle('text-teal-800', active);
      btn.classList.toggle('font-medium', active);
      btn.classList.toggle('text-gray-700', !active);
    });
  }

  function pickInitialLang() {
    try {
      var u = new URL(location.href);
      var q = (u.searchParams.get('lang') || '').toLowerCase().trim().replace(/_/g, '-');
      if (q === 'pt-br' || q === 'pt-pt') q = 'pt';
      if (q === 'sv-se' || q === 'sv-fi') q = 'sv';
      if (q && STR[q]) return q;
    } catch (e0) {}
    try {
      var s = localStorage.getItem('landing_lang');
      var p = localStorage.getItem('preferred-locale');
      if (s && STR[s]) return s;
      if (p && STR[p]) return p;
    } catch (e1) {}
    return 'es';
  }

  function setDropdownOpen(open) {
    var dd = document.getElementById('lang-dropdown');
    var ch = document.getElementById('lang-chevron');
    var tr = document.getElementById('lang-trigger');
    if (!dd) return;
    if (open) {
      dd.classList.remove('hidden');
      if (ch) ch.classList.add('lang-dd-open');
      if (tr) tr.setAttribute('aria-expanded', 'true');
    } else {
      dd.classList.add('hidden');
      if (ch) ch.classList.remove('lang-dd-open');
      if (tr) tr.setAttribute('aria-expanded', 'false');
    }
  }

  function initLangSwitcher() {
    var dd = document.getElementById('lang-dropdown');
    var tr = document.getElementById('lang-trigger');
    if (!dd || !tr) return;
    LANGS.forEach(function (L) {
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.setAttribute('role', 'option');
      btn.setAttribute('data-lang-item', '');
      btn.setAttribute('data-lang-code', L.code);
      btn.className =
        'flex w-full items-center gap-3 px-4 py-2 text-left text-sm text-gray-700 transition-colors hover:bg-gray-100';
      var sf = document.createElement('span');
      sf.className = 'text-xl shrink-0';
      sf.textContent = L.flag;
      var sn = document.createElement('span');
      sn.className = 'flex-1';
      sn.textContent = L.name;
      btn.appendChild(sf);
      btn.appendChild(sn);
      btn.addEventListener('click', function () {
        setLang(L.code);
        setDropdownOpen(false);
      });
      dd.appendChild(btn);
    });
    tr.addEventListener('click', function (e) {
      e.stopPropagation();
      setDropdownOpen(dd.classList.contains('hidden'));
    });
    document.addEventListener('mousedown', function (e) {
      var root = document.getElementById('lang-switcher-root');
      if (root && e.target && !root.contains(e.target)) setDropdownOpen(false);
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') setDropdownOpen(false);
    });
  }

  document.getElementById('seats-dec').addEventListener('click', function () {
    seats = Math.max(1, seats - 1);
    setSeatsControls();
  });
  document.getElementById('seats-inc').addEventListener('click', function () {
    seats = Math.min(99, seats + 1);
    setSeatsControls();
  });
  document.getElementById('iv-month').addEventListener('click', function () {
    interval = 'month';
    setIntervalUi();
  });
  document.getElementById('iv-year').addEventListener('click', function () {
    interval = 'year';
    setIntervalUi();
  });

  document.getElementById('free-form').addEventListener('submit', function (e) {
    e.preventDefault();
    var email = (document.getElementById('free-email').value || '').trim();
    var name = (document.getElementById('free-name').value || '').trim();
    var t = STR[currentLang] || STR.es;
    var msg = document.getElementById('free-msg');
    var err = document.getElementById('free-err');
    var btn = document.getElementById('free-submit');
    if (msg) {
      msg.classList.add('hidden');
      msg.textContent = '';
    }
    if (err) {
      err.classList.add('hidden');
      err.textContent = '';
    }
    if (!email) return;
    var orig = btn.textContent;
    btn.disabled = true;
    btn.textContent = t.freeSending;
    fetch(apiBase() + '/api/public/signup-free', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, name: name || undefined, locale: signupLocaleForApi() })
    })
      .then(function (r) {
        return r.json().then(function (data) {
          return { ok: r.ok, data: data };
        });
      })
      .then(function (x) {
        if (x.ok && x.data && x.data.success) {
          if (msg) {
            msg.textContent = t.freeSuccess;
            msg.classList.remove('hidden');
          }
          document.getElementById('free-email').value = '';
          document.getElementById('free-name').value = '';
        } else {
          var em = (x.data && (x.data.error || x.data.message)) || t.freeError;
          if (err) {
            err.textContent = em;
            err.classList.remove('hidden');
          }
        }
      })
      .catch(function () {
        if (err) {
          err.textContent = t.freeError;
          err.classList.remove('hidden');
        }
      })
      .finally(function () {
        btn.disabled = false;
        btn.textContent = orig;
      });
  });

  initLangSwitcher();
  setLang(pickInitialLang());
  setSeatsControls();
})();
  </script>
</body>
</html>
